    <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = this;
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('formMessage');
            const formData = new FormData(form);
            btn.disabled = true;
            btn.textContent = 'Отправка...';
            msg.className = 'form-message';
            msg.textContent = '';
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    msg.classList.add('success');
                    msg.textContent = 'Сообщение отправлено';
                    form.reset();
                } else {
                    const data = await response.json();
                    throw new Error(data.errors ? Object.values(data.errors)[0] : 'Ошибка отправки');
                }
            } catch (error) {
                msg.classList.add('error');
                msg.textContent = error.message || 'Произошла ошибка. Попробуйте позже.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Отправить сообщение';
            }
        });

        document.getElementById('nostrCopy').addEventListener('click', function(e) {
            e.preventDefault();
            const key = 'npub12c4pyvyu2y5hlskz3f7tn0t6zcqsau9g45p8958g8z8hqqhtjvwq9f6kk4';
            const span = this.querySelector('span');
            const originalText = span.textContent;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(key).then(() => {
                    span.textContent = 'Скопировано!';
                    this.style.backgroundColor = '#27ae60';
                    this.style.color = '#fff';
                    setTimeout(() => {
                        span.textContent = originalText;
                        this.style.backgroundColor = '';
                        this.style.color = '';
                    }, 2000);
                }).catch(() => {
                    fallbackCopy(key, span, originalText, this);
                });
            } else {
                fallbackCopy(key, span, originalText, this);
            }
        });

        function fallbackCopy(text, span, originalText, linkEl) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                span.textContent = 'Скопировано!';
                linkEl.style.backgroundColor = '#27ae60';
                linkEl.style.color = '#fff';
                setTimeout(() => {
                    span.textContent = originalText;
                    linkEl.style.backgroundColor = '';
                    linkEl.style.color = '';
                }, 2000);
            } catch (err) {
                alert('Не удалось скопировать ключ. Выделите и скопируйте его вручную: ' + text);
            }
            document.body.removeChild(textarea);
        }
